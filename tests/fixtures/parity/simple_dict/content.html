<!DOCTYPE html>
<html xmlns:idx="http://www.mobipocket.com/idx" xmlns:mbp="http://www.mobipocket.com">
  <head>
    <title>Parity Test Dictionary</title>
  </head>
  <body>
    <mbp:frameset>
      <idx:entry name="default" scriptable="yes">
        <idx:orth value="alpha">
          <b>alpha</b>
          <idx:infl>
            <idx:iform value="alphas"/>
            <idx:iform value="alphae"/>
          </idx:infl>
        </idx:orth>
        <p>First placeholder headword used by the parity suite.</p>
      </idx:entry>
      <mbp:pagebreak/>
      <idx:entry name="default" scriptable="yes">
        <idx:orth value="bravo">
          <b>bravo</b>
          <idx:infl>
            <idx:iform value="bravos"/>
          </idx:infl>
        </idx:orth>
        <p>Second placeholder used for inflected-form indexing.</p>
      </idx:entry>
      <mbp:pagebreak/>
      <idx:entry name="default" scriptable="yes">
        <idx:orth value="charlie">
          <b>charlie</b>
          <idx:infl>
            <idx:iform value="charlies"/>
            <idx:iform value="charliest"/>
            <idx:iform value="charlying"/>
          </idx:infl>
        </idx:orth>
        <p>Third placeholder with three inflections.</p>
      </idx:entry>
      <mbp:pagebreak/>
      <idx:entry name="default" scriptable="yes">
        <idx:orth value="delta">
          <b>delta</b>
          <idx:infl>
            <idx:iform value="deltas"/>
          </idx:infl>
        </idx:orth>
        <p>Fourth placeholder headword for the parity tests.</p>
      </idx:entry>
      <mbp:pagebreak/>
      <idx:entry name="default" scriptable="yes">
        <idx:orth value="echo">
          <b>echo</b>
          <idx:infl>
            <idx:iform value="echoes"/>
            <idx:iform value="echoing"/>
          </idx:infl>
        </idx:orth>
        <p>Fifth placeholder, ends the set of five entries.</p>
      </idx:entry>
    </mbp:frameset>
  </body>
</html>
